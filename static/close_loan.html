<!DOCTYPE html>
<html>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
<head>
<title>Close Loan Account</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f5f5f5;
}

table{
    width:80%;
    margin:auto;
    border-collapse:collapse;
}

th{
    background:#2c3e50;
    color:white;
    padding:10px;
}

td{
    padding:8px;
}

tr:nth-child(even){
    background:#f2f2f2;
}

button{
    padding:5px 10px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>

<body>

<h2>Loan Accounts</h2>

<table border="1" width="100%">
<thead>

<tr>
<th>Sr</th>
<th>Account</th>
<th>Name</th>
<th>Loan</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<br>
<a href="close_account.html">⬅ Back</a>

<script>

async function load(){

    let res = await fetch("/closed-loans"); 
    let data = await res.json();

    let html = "";

    data.forEach((d, index) => {

        html += `
        <tr ondblclick="openLedger(${d.loan_id})">
            <td>${index + 1}</td>
            <td>${d.loan_id}</td>
            <td>${d.name}</td>
            <td>${d.loan}</td>
            <td>${d.status || 'Running'}</td>
            <td>                
                <button onclick="reopenLoan(${d.loan_id})">Reopen</button>
            </td>
        </tr>`;
    });

    document.getElementById("tbody").innerHTML = html;
}

async function closeLoan(id){
    await fetch(`/close-loan?loan_id=${id}`, {method:"POST"});
    load();
}

async function reopenLoan(id){
    await fetch(`/reopen-loan?loan_id=${id}`, {method:"POST"});
    load();
}

function openLedger(id){
    window.location.href = `/ledger.html?loan_id=${id}`;
}

load();

</script>

</body>
</html>
