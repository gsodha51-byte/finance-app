<!DOCTYPE html>
<html>
<head>
    <title>Close DDS Account</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            text-align:center;
        }

        h2{
            margin-top:20px;
        }

        table{
            width:90%;
            margin:20px auto;
            border-collapse:collapse;
        }

        th, td{
            border:1px solid #ccc;
            padding:8px;
        }

        th{
            background:#2c3e50;
            color:white;
        }

        button{
            padding:5px 10px;
            margin:2px;
            border:none;
            border-radius:4px;
            cursor:pointer;
        }

        .close-btn{ background:red; color:white; }
        .reopen-btn{ background:green; color:white; }

        tr.closed{
            background:#ffe6e6;
        }
    </style>
</head>

<body>

<h2>💰 Close DDS Account</h2>

<table>
<thead>
<tr>
<th>Sr</th>
<th>Account</th>
<th>Name</th>
<th>Mobile</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<br>
<a href="close_account.html">⬅ Back</a>

<script>

// 🔥 LOAD DDS DATA
async function loadDDS(){

    let res = await fetch("/closed-dds");
    let data = await res.json();

    let html = "";

    data.forEach((d, index) => {

        html += `
        <tr>
            <td>${index + 1}</td>
            <td>${d.account_no}</td>
            <td>${d.name}</td>
            <td>${d.mobile}</td>
            <td>${d.status || 'Running'}</td>
            <td>
                <button onclick="reopen(${d.id})">Reopen</button>
            </td>
        </tr>
        `;
    });

    document.getElementById("tbody").innerHTML = html;
}


// 🔴 CLOSE DDS
async function closeDDS(id){

    console.log("Closing ID:", id);   // 🔥 debug

    let res = await fetch("/close-dds", {
        method:"POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            dds_id: id
        })
    });

    let data = await res.json();
    console.log("Response:", data);   // 🔥 debug

    loadDDS();
}


// 🟢 REOPEN DDS
async function reopenDDS(id){

    if(!confirm("Reopen this account?")) return;

    await fetch(`/reopen-dds?dds_id=${id}`, {
        method:"POST"
    });

    alert("Account Reopened ✅");
    loadDDS();
}


// 🔥 AUTO LOAD
loadDDS();

function openLedger(id){
    window.location.href = `dds_ledger.html?dds_id=${id}`;
}

</script>

</body>
</html>
