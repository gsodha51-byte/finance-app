<!DOCTYPE html>
<html>
<head>
    <title>Daily Dashboard</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <style>
        body{
            font-family: Arial;
            background:#f5f6fa;
            text-align:center;
        }

        .cards button{
            margin:5px;
            padding:15px;
            font-size:14px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        .dds{ background:#2ecc71; color:white; }
        .daily{ background:#3498db; color:white; }
        .monthly{ background:#e67e22; color:white; }

        table{
            width:90%;
            margin:20px auto;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #ccc;
            padding:8px;
        }

        th{
            background:#2c3e50;
            color:white;
        }
    </style>

</head>

<body>

<h2>Daily Dashboard</h2>

<!-- DATE -->
Select Date:
<input type="date" id="date" onchange="load()">

<br><br>

<!-- CARDS -->
<div class="cards" id="cards"></div>

<br>

<!-- SUMMARY -->
<div id="summary"></div>

<!-- TABLE -->
<table>
<thead>
<tr>
    <th>Type</th>
    <th>Account</th>
    <th>Name</th>
    <th>Amount</th>
    <th>Mode</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<button onclick="goBack()">Back</button>

<script>

let fullData = [];

async function load(){

    let date = document.getElementById("date").value;
    let url = "/daily-collection";

    if(date) url += "?date=" + date;

    let res = await fetch(url);
    let data = await res.json();

    fullData = data.data;

    renderTable(fullData);
    renderCards(fullData);
    renderSummary(fullData);
}


// TABLE
function renderTable(data){

    let html = "";

    data.forEach(d => {
        html += `
        <tr>
            <td>${d.type}</td>
            <td>${d.account}</td>
            <td>${d.name}</td>
            <td>${d.amount}</td>
            <td>${d.mode}</td>
        </tr>
        `;
    });

    document.getElementById("tbody").innerHTML = html;
}


// CARDS
function renderCards(data){

    let dds = 0, daily = 0, monthly = 0;

    data.forEach(d=>{
        if(d.type==="DDS") dds+=d.amount;
        else if(d.type==="Daily") daily+=d.amount;
        else if(d.type==="Monthly") monthly+=d.amount;
    });

    document.getElementById("cards").innerHTML = `
        <button class="dds" onclick="filterType('DDS')">DDS<br>₹${dds}</button>
        <button class="daily" onclick="filterType('Daily')">Daily<br>₹${daily}</button>
        <button class="monthly" onclick="filterType('Monthly')">Monthly<br>₹${monthly}</button>
        <button onclick="filterType('ALL')">ALL</button>
    `;
}


// FILTER
function filterType(type){

    if(type==="ALL"){
        renderTable(fullData);
        return;
    }

    let filtered = fullData.filter(d => d.type===type);
    renderTable(filtered);
}


// SUMMARY
function renderSummary(data){

    let total = 0, cash = 0, online = 0;

    data.forEach(d=>{
        total += d.amount;
        if(d.mode==="Cash") cash += d.amount;
        else online += d.amount;
    });

    document.getElementById("summary").innerHTML = `
        <b>Total:</b> ₹${total} |
        <b>Cash:</b> ₹${cash} |
        <b>Online:</b> ₹${online}
    `;
}


// BACK
function goBack(){
    window.history.back();
}


// DEFAULT DATE
document.getElementById("date").value = new Date().toISOString().split("T")[0];

load();

</script>

</body>
</html>
