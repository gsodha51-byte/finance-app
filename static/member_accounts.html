<!DOCTYPE html>
<html>
<head>
    <title>Member Accounts</title>

    <meta http-equiv="Cache-Control" content="no-cache">

    <style>
    body{ font-family:Arial; text-align:center; background:#f5f5f5; }
    table{ width:80%; margin:20px auto; border-collapse:collapse; }
    th,td{ border:1px solid #ccc; padding:8px; }
    th{ background:#2c3e50; color:white; }
    </style>
</head>

<body>

<h2>📂 Member Accounts</h2>

<table>
<thead>
<tr>
    <th>Account No</th>
    <th>Type</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<br>
<button onclick="history.back()">⬅ Back</button>

<script>

function getMobile(){
    let params = new URLSearchParams(window.location.search);
    return params.get("mobile");
}

async function load(){

    let mobile = getMobile();

    let res = await fetch("/member-accounts?mobile=" + mobile);
    let data = await res.json();

    let html = "";

    data.forEach(d => {
        html += `
        <tr onclick="openLedger('${d.id}', '${d.type}')" style="cursor:pointer;">
            <td>${d.account_no}</td>
            <td>${d.type}</td>
        </tr>
        `;
    });

    document.getElementById("data").innerHTML = html;
}

function openLedger(id, type){

    if(type === "DDS"){
        window.location.href = "/dds_ledger.html?dds_id=" + id;
    }else{
        window.location.href = "/ledger.html?loan_id=" + id;
    }
}

load();

</script>

</body>
</html>
