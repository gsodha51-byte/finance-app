<!DOCTYPE html>
<html>
<head>
    <title>Daily Loan</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

<style>
body{ font-family: Arial; text-align:center; background:#f5f5f5; }

.box{
    width:300px;
    margin:auto;
    margin-top:60px;
    background:white;
    padding:20px;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    margin:10px 0;
    font-size:16px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.add{ background:green; color:white; }
.collect{ background:#2196F3; color:white; }

</style>
</head>

<body>

<h2>📅 Daily Loan System</h2>

<div class="box">

    <button class="add" onclick="goAdd()">
        ➕ Add Member
    </button>

    <button class="collect" onclick="goCollection()">
        ⚡ Fast Collection
    </button>

    <button style="background:#e67e22; color:white;" onclick="goDue()">
        📋 Due Members
    </button>

</div>

<br>
<a href="/">← Back</a>

<script>

function goAdd(){
    window.location.href = "add_member.html?type=Daily";
}

function goCollection(){
    window.location.href = "daily_fast_collection.html";
}

function goDue(){
    window.location.href = "due-members.html";
}

</script>

</body>
</html>
